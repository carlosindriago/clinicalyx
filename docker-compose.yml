services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicalyx_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinicalyx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinicalyx_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-clinicalyx}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clinicalyx_net

  web:
    image: node:20-alpine
    container_name: clinicalyx_web
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      BACKEND_API_URL: ${BACKEND_API_URL:-http://host.docker.internal:8080/api/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres
    networks:
      - clinicalyx_net

  minio:
    image: minio/minio:latest
    container_name: clinicalyx_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: clinicalyx_admin
      MINIO_ROOT_PASSWORD: clinicalyx_secret
    volumes:
      - minio_data:/data
    networks:
      - clinicalyx_net

  minio-init:
    image: minio/mc:latest
    container_name: clinicalyx_minio_init
    entrypoint: |
      sh -c "
      until mc alias set local http://minio:9000 clinicalyx_admin clinicalyx_secret 2>/dev/null; do
        echo 'Waiting for MinIO to be ready...'
        sleep 2
      done
      mc mb local/clinicalyx-files --ignore-existing
      echo 'MinIO bucket initialized successfully'
      "
    depends_on:
      - minio
    networks:
      - clinicalyx_net

volumes:
  pgdata:
  minio_data:

networks:
  clinicalyx_net:
    driver: bridge
