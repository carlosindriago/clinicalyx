version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicalyx_postgres
    environment:
      POSTGRES_USER: carlos
      POSTGRES_PASSWORD: clinicalyx_secure_pass_2026
      POSTGRES_DB: clinicalyx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carlos -d clinicalyx"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clinicalyx_net

  web:
    image: node:20-alpine
    container_name: clinicalyx_web
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
      - BACKEND_API_URL=http://host.docker.internal:8080/api/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres
    networks:
      - clinicalyx_net

volumes:
  pgdata:

networks:
  clinicalyx_net:
    driver: bridge

